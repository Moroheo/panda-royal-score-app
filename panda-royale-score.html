<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐼 パンダロイヤル スコアボード</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Boogaloo&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --gold: #f5c518;
    --teal: #4ecdc4;
    --white: #f0f0f0;
    --muted: #8892a4;
    --green: #56cf86;
    --red: #e94560;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(78,205,196,0.08) 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 80%, rgba(233,69,96,0.08) 0%, transparent 50%);
  }

  header {
    text-align: center;
    padding: 2rem 1rem 1rem;
  }

  header h1 {
    font-family: 'Boogaloo', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: var(--gold);
    letter-spacing: 0.05em;
    text-shadow: 0 0 20px rgba(245,197,24,0.4);
  }

  header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.3rem;
  }

  .setup-panel {
    max-width: 500px;
    margin: 2rem auto;
    padding: 0 1rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid rgba(78,205,196,0.2);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .card h2 {
    font-size: 1.1rem;
    color: var(--teal);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .player-count-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .player-count-row label {
    color: var(--muted);
    font-size: 0.9rem;
  }

  .count-btns {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .count-btn {
    width: 36px; height: 36px;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: var(--white);
    font-size: 1.2rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .count-btn:hover { background: var(--accent); }

  .count-display {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--gold);
    min-width: 2rem;
    text-align: center;
  }

  .player-names {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    margin-top: 1rem;
  }

  .player-name-row {
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }

  .player-badge {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  input[type="text"] {
    flex: 1;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--white);
    font-family: inherit;
    font-size: 0.95rem;
    padding: 0.5rem 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--teal);
  }

  .btn-primary {
    width: 100%;
    padding: 0.9rem;
    background: linear-gradient(135deg, var(--accent), #c0392b);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: inherit;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.05em;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  /* ゲーム画面 */
  .game-panel {
    display: none;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 0.5rem 3rem;
  }

  .round-indicator {
    text-align: center;
    padding: 1rem;
    font-size: 1.1rem;
    color: var(--muted);
  }

  .round-indicator span {
    color: var(--gold);
    font-weight: 700;
    font-size: 1.5rem;
  }

  /* スコアテーブル */
  .score-table-wrap {
    overflow-x: auto;
    padding: 0 0.5rem;
  }

  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    min-width: 400px;
  }

  thead th {
    background: var(--card);
    padding: 0.7rem 0.5rem;
    font-size: 0.85rem;
    color: var(--teal);
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 2;
  }

  thead th:first-child {
    border-radius: 10px 0 0 0;
    text-align: left;
    padding-left: 1rem;
    width: 90px;
  }

  thead th:last-child {
    border-radius: 0 10px 0 0;
  }

  tbody tr td {
    background: var(--surface);
    padding: 0.5rem 0.4rem;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 0.9rem;
  }

  tbody tr td:first-child {
    color: var(--muted);
    font-size: 0.8rem;
    padding-left: 1rem;
    text-align: left;
  }

  tbody tr:hover td { background: rgba(78,205,196,0.05); }

  /* 入力セル */
  .score-input {
    width: 60px;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    color: var(--white);
    font-family: inherit;
    font-size: 0.9rem;
    padding: 0.35rem 0.4rem;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .score-input:focus {
    border-color: var(--teal);
    background: rgba(78,205,196,0.1);
  }

  .score-input.filled {
    color: var(--gold);
    border-color: rgba(245,197,24,0.3);
  }

  /* 合計行 */
  tfoot td {
    background: var(--card);
    padding: 0.7rem 0.4rem;
    text-align: center;
    font-weight: 700;
  }

  tfoot td:first-child {
    color: var(--teal);
    font-size: 0.85rem;
    padding-left: 1rem;
    text-align: left;
  }

  .total-score {
    font-size: 1.1rem;
    color: var(--gold);
  }

  .total-score.winner {
    color: var(--green);
    text-shadow: 0 0 10px rgba(86,207,134,0.5);
  }

  /* プレイヤーヘッダー */
  .player-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
  }

  .player-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }

  /* 現在ラウンドハイライト */
  tr.current-round td {
    background: rgba(78,205,196,0.07);
  }

  tr.current-round td:first-child::before {
    content: '▶ ';
    color: var(--teal);
  }

  /* アクションバー */
  .action-bar {
    display: flex;
    gap: 0.7rem;
    padding: 1rem 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-sec {
    flex: 1;
    min-width: 120px;
    padding: 0.75rem 1rem;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: var(--white);
    font-family: inherit;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-sec:hover { background: rgba(78,205,196,0.15); border-color: var(--teal); }

  .btn-danger {
    background: rgba(233,69,96,0.1);
    border-color: rgba(233,69,96,0.3);
    color: var(--accent);
  }

  .btn-danger:hover { background: rgba(233,69,96,0.2); }

  /* 結果モーダル */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.show {
    display: flex;
  }

  .modal {
    background: var(--surface);
    border: 1px solid rgba(245,197,24,0.3);
    border-radius: 20px;
    padding: 2rem 1.5rem;
    max-width: 380px;
    width: 90%;
    text-align: center;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .modal h2 {
    font-size: 1.8rem;
    color: var(--gold);
    margin-bottom: 0.5rem;
  }

  .modal .panda-emoji {
    font-size: 4rem;
    display: block;
    margin-bottom: 0.5rem;
  }

  .ranking-list {
    list-style: none;
    margin: 1rem 0;
    text-align: left;
  }

  .ranking-list li {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.5rem 0.7rem;
    border-radius: 8px;
    margin-bottom: 0.4rem;
    background: rgba(255,255,255,0.04);
  }

  .ranking-list li.rank-1 { background: rgba(245,197,24,0.1); }
  .ranking-list li.rank-2 { background: rgba(192,192,192,0.08); }
  .ranking-list li.rank-3 { background: rgba(205,127,50,0.08); }

  .rank-num { font-size: 1.2rem; min-width: 1.5rem; }
  .rank-name { flex: 1; font-weight: 700; }
  .rank-score { color: var(--gold); font-weight: 700; }

  /* 色パレット */
  .COLORS { display: none; }

  /* responsive */
  @media (max-width: 480px) {
    .score-input { width: 50px; }
  }
</style>
</head>
<body>

<!-- セットアップ画面 -->
<div id="setup-screen">
  <header>
    <h1>🐼 パンダロイヤル</h1>
    <p>スコアボード</p>
  </header>

  <div class="setup-panel">
    <div class="card">
      <h2>👥 プレイヤー数</h2>
      <div class="player-count-row">
        <label>人数を選択：</label>
        <div class="count-btns">
          <button class="count-btn" onclick="changeCount(-1)">－</button>
          <div class="count-display" id="count-disp">4</div>
          <button class="count-btn" onclick="changeCount(1)">＋</button>
        </div>
        <span id="count-label" style="color:var(--muted);font-size:0.85rem;">4人</span>
      </div>
      <div class="player-names" id="player-names"></div>
    </div>

    <button class="btn-primary" onclick="startGame()">ゲームスタート 🎲</button>
  </div>
</div>

<!-- ゲーム画面 -->
<div id="game-screen" class="game-panel">
  <header>
    <h1>🐼 パンダロイヤル</h1>
  </header>

  <div class="round-indicator">
    ラウンド <span id="current-round-disp">1</span> / 10
  </div>

  <div class="score-table-wrap">
    <table id="score-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
      <tfoot id="table-foot"></tfoot>
    </table>
  </div>

  <div class="action-bar">
    <button class="btn-sec" onclick="showResult()">🏆 最終結果</button>
    <button class="btn-sec btn-danger" onclick="resetGame()">🔄 リセット</button>
  </div>
</div>

<!-- 結果モーダル -->
<div class="modal-overlay" id="result-modal">
  <div class="modal">
    <span class="panda-emoji">🐼</span>
    <h2>結果発表！</h2>
    <ul class="ranking-list" id="ranking-list"></ul>
    <button class="btn-primary" onclick="closeModal()" style="margin-top:0.5rem">閉じる</button>
    <button class="btn-sec btn-danger" onclick="resetGame()" style="margin-top:0.5rem;width:100%">もう一度プレイ</button>
  </div>
</div>

<script>
const PLAYER_COLORS = [
  { bg: '#e94560', text: '#fff' },
  { bg: '#4ecdc4', text: '#1a1a2e' },
  { bg: '#f5c518', text: '#1a1a2e' },
  { bg: '#a78bfa', text: '#fff' },
  { bg: '#56cf86', text: '#1a1a2e' },
  { bg: '#f97316', text: '#fff' },
  { bg: '#ec4899', text: '#fff' },
  { bg: '#38bdf8', text: '#1a1a2e' },
  { bg: '#fbbf24', text: '#1a1a2e' },
  { bg: '#84cc16', text: '#1a1a2e' },
];

const TOTAL_ROUNDS = 10;
let playerCount = 4;
let players = [];
let scores = []; // scores[round][player]
let currentRound = 1;

// --- Setup ---
function changeCount(d) {
  playerCount = Math.min(10, Math.max(2, playerCount + d));
  document.getElementById('count-disp').textContent = playerCount;
  document.getElementById('count-label').textContent = playerCount + '人';
  renderNameInputs();
}

function renderNameInputs() {
  const container = document.getElementById('player-names');
  container.innerHTML = '';
  for (let i = 0; i < playerCount; i++) {
    const c = PLAYER_COLORS[i];
    const row = document.createElement('div');
    row.className = 'player-name-row';
    row.innerHTML = `
      <div class="player-badge" style="background:${c.bg};color:${c.text}">P${i+1}</div>
      <input type="text" id="pname-${i}" placeholder="プレイヤー${i+1}" maxlength="10">
    `;
    container.appendChild(row);
  }
}

function startGame() {
  players = [];
  for (let i = 0; i < playerCount; i++) {
    const v = document.getElementById(`pname-${i}`).value.trim();
    players.push(v || `P${i+1}`);
  }

  // スコア初期化
  scores = [];
  for (let r = 0; r < TOTAL_ROUNDS; r++) {
    scores.push(new Array(playerCount).fill(null));
  }
  currentRound = 1;

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';

  renderTable();
}

// --- Table ---
function renderTable() {
  document.getElementById('current-round-disp').textContent = currentRound;
  renderHead();
  renderBody();
  renderFoot();
}

function renderHead() {
  const head = document.getElementById('table-head');
  let html = '<tr><th>ラウンド</th>';
  for (let i = 0; i < players.length; i++) {
    const c = PLAYER_COLORS[i];
    html += `<th>
      <div class="player-header">
        <div class="player-dot" style="background:${c.bg}"></div>
        ${esc(players[i])}
      </div>
    </th>`;
  }
  html += '</tr>';
  head.innerHTML = html;
}

function renderBody() {
  const body = document.getElementById('table-body');
  let html = '';
  for (let r = 0; r < TOTAL_ROUNDS; r++) {
    const isCurrent = (r + 1) === currentRound;
    html += `<tr class="${isCurrent ? 'current-round' : ''}">`;
    html += `<td>第${r+1}ラウンド</td>`;
    for (let p = 0; p < players.length; p++) {
      const val = scores[r][p];
      const inputClass = val !== null ? 'score-input filled' : 'score-input';
      html += `<td>
        <input type="number" class="${inputClass}" 
          id="s-${r}-${p}" 
          value="${val !== null ? val : ''}"
          placeholder="-"
          oninput="onScoreInput(${r},${p},this)"
          onfocus="onFocusRound(${r+1})"
        >
      </td>`;
    }
    html += '</tr>';
  }
  body.innerHTML = html;
}

function renderFoot() {
  const foot = document.getElementById('table-foot');
  const totals = getTotals();
  const maxTotal = Math.max(...totals);

  let html = '<tr><td>合計</td>';
  for (let p = 0; p < players.length; p++) {
    const isWinner = totals[p] === maxTotal && maxTotal > 0;
    html += `<td class="total-score ${isWinner ? 'winner' : ''}">${totals[p]}</td>`;
  }
  html += '</tr>';
  foot.innerHTML = html;
}

function onScoreInput(r, p, el) {
  const v = el.value.trim();
  scores[r][p] = v === '' ? null : parseInt(v);
  el.classList.toggle('filled', v !== '');
  updateRound();
  renderFoot();
}

function onFocusRound(r) {
  currentRound = r;
  document.getElementById('current-round-disp').textContent = r;
  // ハイライト更新
  document.querySelectorAll('#table-body tr').forEach((tr, i) => {
    tr.classList.toggle('current-round', (i + 1) === r);
  });
}

function updateRound() {
  // 全員入力済みのラウンドを探して次のラウンドへ
  for (let r = 0; r < TOTAL_ROUNDS; r++) {
    if (scores[r].some(v => v === null)) {
      currentRound = r + 1;
      document.getElementById('current-round-disp').textContent = currentRound;
      return;
    }
  }
  currentRound = TOTAL_ROUNDS;
}

function getTotals() {
  return players.map((_, p) =>
    scores.reduce((sum, row) => sum + (row[p] !== null ? row[p] : 0), 0)
  );
}

// --- Result ---
function showResult() {
  const totals = getTotals();
  const ranked = players.map((name, i) => ({ name, score: totals[i] }))
    .sort((a, b) => b.score - a.score);

  const medals = ['🥇', '🥈', '🥉'];
  const list = document.getElementById('ranking-list');
  list.innerHTML = ranked.map((p, i) => `
    <li class="rank-${i+1}">
      <span class="rank-num">${medals[i] || (i+1) + '位'}</span>
      <span class="rank-name">${esc(p.name)}</span>
      <span class="rank-score">${p.score}点</span>
    </li>
  `).join('');

  document.getElementById('result-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('result-modal').classList.remove('show');
}

function resetGame() {
  closeModal();
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'block';
  renderNameInputs();
}

function esc(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// 初期化
renderNameInputs();
</script>
</body>
</html>
